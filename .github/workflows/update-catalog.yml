name: Update Breezart catalog

# Запуск раз в месяц (1-е число, 03:00 UTC) + по ручному триггеру.
on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r backend/requirements.txt

      - name: Run parser
        run: python backend/parser.py frontend/catalog.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/catalog.json
          if git diff --cached --quiet; then
            echo "Каталог не изменился — коммит не нужен"
          else
            git commit -m "chore: обновлён catalog.json (auto)"
            git push
          fi
