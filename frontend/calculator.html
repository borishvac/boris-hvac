<script>

// >>>> 3. Компания (для шапки PDF)

  phone: "+7 (926) 082-14-88",
  email: "boris.hvac@yandex.ru",
  site: "boris-hvac.ru",

// ============================================================

const STATE = {

  area: 200,

  // Каталог Breezart

  catalogVersion: null,

  packages: null,
  context: null,
};

// ============================================================
//                ЗАГРУЗКА КАТАЛОГА BREEZART
// ============================================================

async function loadCatalog() {
  try {
    const r = await fetch(CATALOG_URL, { cache: "no-cache" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    if (!data.series || typeof data.series !== "object") {
      throw new Error("invalid catalog format");
    }
    STATE.catalog = data;
    STATE.catalogVersion = data.version || "n/a";
    document.getElementById("bz-catalog-info").textContent =
      "Цены Breezart актуальны на " + (data.version ? new Date(data.version).toLocaleDateString("ru-RU") : "—") +
      ". Источник: breezart.ru/tech/price_breezart.pdf";
  } catch (e) {
    STATE.catalogError = e.message || String(e);
    console.error("[BZ] не удалось загрузить каталог:", e);
    document.getElementById("bz-catalog-info").innerHTML =
      "<span style='color:#b91c1c'>Не удалось загрузить актуальный каталог Breezart. " +
      "Используется встроенный список.</span>";
    STATE.catalog = FALLBACK_CATALOG;
  }
}

// ============================================================

/**
 * Подбирает модель приточки в конкретной серии.
 * Возвращает { name, nominal, price, heater } или null.
 */
function pickFromSeries(series, requiredFlow, requiredKw) {
  if (!series || !series.length) return null;

  // Кандидаты по расходу (с небольшим запасом 5%)
  const candidates = series.filter(m => m.nominal >= requiredFlow * 0.95);
  if (!candidates.length) return null;

  // Берём ближайший по типоразмеру
  candidates.sort((a, b) => a.nominal - b.nominal);
  const best = candidates[0];

  // Если у модели есть массив heaters — подбираем по мощности
  if (Array.isArray(best.heaters) && best.heaters.length) {
    const suitable = best.heaters.filter(h => h[0] >= requiredKw);
    let heater, price;
    if (suitable.length) {
      heater = suitable.sort((a, b) => a[0] - b[0])[0];
    } else {
      heater = best.heaters.slice().sort((a, b) => b[0] - a[0])[0]; // самый мощный
    }
    return {
      name: best.name, nominal: best.nominal,
      heater: heater[0], price: heater[1],
      underpowered: heater[0] < requiredKw,
    };
  }

  // Aqua-модели — цена фиксированная
  return {
    name: best.name, nominal: best.nominal,
    heater: null, price: best.price,
  };
}

/**
 * Для аллергии — доплата за секцию E11 по ближайшему большему типоразмеру.
 */
function e11Addon(nominal) {
  const sizes = Object.keys(STATE.catalog.e11_addon || {}).map(Number).sort((a, b) => a - b);
  if (!sizes.length) return 0;
  const found = sizes.find(s => s >= nominal);
  const key = found || sizes[sizes.length - 1];
  return STATE.catalog.e11_addon[String(key)] || 0;
}

/**
 * Главный подбор приточки под комплектацию.
 */
function pickIntakeUnit(pkg, requiredFlow, requiredKw) {
  // Выбор серии по правилам с листа «Приточка расчёт»
  let seriesKeys;
  const isCooler = (pkg === "lux"); // охладитель только в Люкс
  const isAqua = (STATE.propertyType === "house" && STATE.heating === "gas");

  if (isAqua) {
    seriesKeys = isCooler ? ["aqua_f"] : ["aqua"];
  } else {
    // Электр. нагреватель: квартира всегда, дом+электричество тоже
    seriesKeys = isCooler ? ["lux_f"] : ["lux"];
  }

  let pick = null;
  for (const k of seriesKeys) {
    pick = pickFromSeries(STATE.catalog.series[k], requiredFlow, requiredKw);
    if (pick) break;
  }
  if (!pick) {
    // Фолбэк: пробуем любую серию с расходом
    const allKeys = ["lux", "lux_f", "aqua", "aqua_f"];
    for (const k of allKeys) {
      pick = pickFromSeries(STATE.catalog.series[k], requiredFlow, requiredKw);
      if (pick) break;
    }
  }
  return pick;
}

function calcPackage(pkg) {
  const items = [];   // [{section, name, price, comment}]
  const ctx = STATE.context;

  // -------- ВЕНТИЛЯЦИЯ --------
  // 1. Приточка
  const flow = ctx.requiredFlow * RULES.RESERVE[pkg];
  // Требуемая мощность нагрева (упрощённо): для МО, T_внеш=-23, T_вых=22 → ΔT≈45
  // Q_kW = m³/ч × 1.2 / 3600 × 1.005 × 45 ≈ flow × 0.015
  const requiredKw = flow * 0.015;

  const pick = pickIntakeUnit(pkg, flow, requiredKw);

  if (pick) {
    let price = pick.price;
    let comment = `Расход ${Math.round(flow)} м³/ч`;
    if (pick.heater) comment += `, нагрев ${pick.heater} кВт`;
    if (pick.underpowered) comment += " (нагреватель ограничен)";

    items.push({
      section: "Вентиляция",
      name: `Приточная установка Breezart ${pick.name}`,
      price, comment,
    });

    // Аллергии — секция E11
    if (STATE.allergy === "yes") {
      const e11 = e11Addon(pick.nominal);
      if (e11) {
        items.push({
          section: "Вентиляция",
          name: "Секция фильтра E11 (HEPA)",
          price: e11,
          comment: "Фильтр тонкой очистки для аллергиков",
        });
      }
    }
  }

  // 2. Соединительный комплект
  if (pkg === "lux" && STATE.propertyType === "house") {
    items.push({
      section: "Вентиляция",
      name: "Соединительный комплект",
      price: RULES.CONNECT_KIT_HOUSE_LUX,
    });
  }

  // 3. Вентилятор техпомещений
  if (STATE.techRooms > 0) {
    const pairs = Math.ceil(STATE.techRooms / RULES.FAN_PER_TECH_PAIR);
    let price;
    if (pkg === "lux" && STATE.propertyType === "house") {
      price = RULES.FAN_LUX_HOUSE * pairs;
    } else {
      price = RULES.FAN_STD * pairs;
    }
    items.push({
      section: "Вентиляция",
      name: pkg === "lux" && STATE.propertyType === "house" ? "Вентилятор Lux" : "Вентилятор стандарт",
      price,
      comment: `На ${STATE.techRooms} тех. помещ. (${pairs} ${pairs === 1 ? "шт" : "шт"}.)`,
    });
  }

  // 4. Воздуховоды вентиляции
  const ductBase = RULES.DUCT_BASE_PRICE / RULES.DUCT_BASE_FLOW; // ₽ за м³/ч на 100% от мощности
  const ductPrice = Math.round(flow * RULES.DUCT_PCT[pkg] * ductBase / 0.13); // нормируем к 13% = базовая ставка 40К/300м³
  // Проверка: при flow=300, pct=0.13 → 300 × 0.13 × (40000/300) / 0.13 = 40000 ✓
  items.push({
    section: "Вентиляция",
    name: "Воздуховоды вентиляции",
    price: ductPrice,
    comment: `${Math.round(RULES.DUCT_PCT[pkg] * 100)}% от расхода`,
  });

  // 5. Крепёж/расходники (линейно по площади)
  const hardware = (STATE.area / 100) * RULES.HARDWARE_PER_100M2[pkg];
  items.push({
    section: "Вентиляция",
    name: "Крепёжные и расходные материалы",
    price: Math.round(hardware),
    comment: `${(STATE.area / 100).toFixed(2)} × 100 м²`,
  });

  // 6. Транспорт
  const tMult = STATE.location === "region" ? RULES.TRANSPORT_REGION_MULT : 1;
  const transport = (STATE.area / 100) * RULES.TRANSPORT_PER_100M2 * tMult;
  items.push({
    section: "Вентиляция",
    name: "Накладные и транспортные расходы",
    price: Math.round(transport),
    comment: STATE.location === "region" ? "МО — ×2" : "Москва",
  });

  // 7. Утеплитель
  const insulation = (STATE.area / 100) * RULES.INSULATION_PER_100M2[pkg];
  let insulationName;
  if (pkg === "basic") insulationName = "Утеплитель: пенофол";
  else if (pkg === "comfort") insulationName = "Утеплитель: каучук 50%";
  else insulationName = "Утеплитель: каучук";
  items.push({ section: "Вентиляция", name: insulationName, price: Math.round(insulation) });

  // -------- КОНДИЦИОНИРОВАНИЕ --------
  const isIndustrial = (STATE.area > RULES.AC_THRESHOLD_AREA || STATE.rooms >= RULES.AC_THRESHOLD_ROOMS);
  const category = isIndustrial ? "industrial" : "residential";

  // 8. Блоки кондиционеров
  let acPrice = 0, acName = "";
  if (isIndustrial) {
    // Промышленная — по таблице (площадь × 0.07 → ближ. больший)
    const needKw = STATE.area * RULES.AC_KW_PER_M2;
    const row = RULES.AC_INDUSTRIAL_TABLE.find(r => r[0] >= needKw)
              || RULES.AC_INDUSTRIAL_TABLE[RULES.AC_INDUSTRIAL_TABLE.length - 1];
    acPrice = row[1] * (pkg === "lux" ? RULES.AC_INDUSTRIAL_LUX_MULT : 1);
    acName = `Промышленный кондиционер ${row[0]} кВт`;
  } else {
    // Бытовая
    if (pkg === "lux") {
      // Прямой lookup
      acPrice = RULES.AC_RESI_LUX_TABLE[STATE.rooms] || RULES.AC_RESI_LUX_TABLE[5];
      acName = `Мульти-сплит Люкс (${STATE.rooms} комнат)`;
    } else {
      // Базово/Комфорт: внутр × комнат + внешний
      const indoor = RULES.AC_RESI_INDOOR_PER_ROOM * STATE.rooms;
      const outdoor = (STATE.area <= RULES.AC_RESI_AREA_THRESHOLD)
        ? RULES.AC_RESI_OUTDOOR_SMALL : RULES.AC_RESI_OUTDOOR_LARGE;
      acPrice = indoor + outdoor;
      acName = `Мульти-сплит (${STATE.rooms} внутр. + 1 внешн.)`;
    }
  }
  items.push({
    section: "Кондиционирование",
    name: acName,
    price: Math.round(acPrice),
    comment: isIndustrial ? "Промышленная категория" : "Бытовая категория",
  });

  // 9. Пульт
  items.push({
    section: "Кондиционирование",
    name: "Пульт управления",
    price: RULES.AC_REMOTE[pkg][category],
  });

  // 10–16. На каждую комнату
  const perRoomItems = [
    ["Воздуховоды оцинк. сталь", "duct_steel"],
    ["Гибкие тепло-шумоизолир. в/в", "duct_flex"],
    ["Пленум для канального блока", "plenum"],
    ["Фреонопровод", "freon_pipe"],
    ["Кабельная продукция", "cable"],
    ["Дренажный трубопровод", "drainage"],
    ["Сухой сифон", "dry_siphon"],
  ];
  for (const [label, key] of perRoomItems) {
    items.push({
      section: "Кондиционирование",
      name: label,
      price: RULES.PER_ROOM_AC[key][pkg] * STATE.rooms,
      comment: `${STATE.rooms} комн × ${(RULES.PER_ROOM_AC[key][pkg] / 1000).toFixed(0)}К`,
    });
  }

  // -------- ДЕКОР --------
  // 17. Вытяжка из техпомещений
  if (STATE.techRooms > 0) {
    items.push({
      section: "Декоративные элементы",
      name: "Вытяжка из технических помещений",
      price: RULES.PER_TECH_ROOM.exhaust_decor[pkg] * STATE.techRooms,
      comment: `${STATE.techRooms} тех. помещ.`,
    });
  }

  // 18. Подача воздуха из кондиционера
  items.push({
    section: "Декоративные элементы",
    name: "Подача воздуха из кондиционера",
    price: RULES.PER_ROOM_AC.ac_diffuser[pkg] * STATE.rooms,
    comment: `${STATE.rooms} комн`,
  });

  // -------- УВЛАЖНЕНИЕ --------
  const humid = calcHumidifier(pkg, STATE.rooms);
  if (humid) {
    items.push({
      section: "Увлажнение",
      name: humid.name,
      price: humid.price,
      comment: humid.comment,
    });
  }

  // -------- ОЗОНАЦИЯ --------
  if (STATE.pets === "yes" && pkg === "lux" && STATE.propertyType === "house") {
    items.push({
      section: "Дополнительно",
      name: "Озонация (для домов с животными)",
      price: RULES.OZONATION_LUX_HOUSE,
    });
  }

  // -------- ПНР --------
  const subtotal = items.reduce((s, i) => s + i.price, 0);
  const commissioning = Math.round(subtotal * RULES.COMMISSIONING_PCT);
  items.push({
    section: "Пусконаладочные работы",
    name: "ПНР",
    price: commissioning,
    comment: `${(RULES.COMMISSIONING_PCT * 100).toFixed(0)}% от стоимости`,
  });

  const total = subtotal + commissioning;
  return { items, total, intakeUnit: pick };
}

/**
 * Увлажнение: выбираем выгодную конфигурацию из двух типов установок.
 */
function calcHumidifier(pkg, rooms) {
  const cfg = RULES.HUMIDIFIER;
  if (rooms <= 0) return null;

  // Перебор: сколько маленьких + сколько больших
  // Маленькая обслуживает ≤6 комнат, большая ≤12 комнат.
  // Берём комбинацию с минимальной ценой.
  let best = null;
  for (let big = 0; big <= 3; big++) {
    for (let small = 0; small <= 5; small++) {
      const cap = small * cfg.SMALL_MAX_ROOMS + big * cfg.BIG_MAX_ROOMS;
      if (cap < rooms) continue;
      if (small + big === 0) continue;
      const cost = small * cfg.SMALL_PRICE + big * cfg.BIG_PRICE;
      if (!best || cost < best.cost) {
        best = { small, big, cost };
      }
    }
  }
  if (!best) return null;

  const perRoom = cfg.PER_ROOM[pkg] * rooms;
  const total = best.cost + perRoom;
  const parts = [];
  if (best.small) parts.push(`${best.small} × малая`);
  if (best.big) parts.push(`${best.big} × большая`);
  return {
    name: "Система увлажнения воздуха",
    price: total,
    comment: parts.join(" + ") + `, ${rooms} комн`,
  };
}

function setupToggles() {
  document.querySelectorAll("[data-toggle]").forEach(group => {
    const key = group.dataset.toggle;
    group.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        group.querySelectorAll("button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        STATE[key] = btn.dataset.value;
        if (key === "propertyType") updateHeatingVisibility();
        validateSurvey();
      });
    });
  });
  updateHeatingVisibility();
}

function updateHeatingVisibility() {
  const field = document.getElementById("bz-heating-field");
  field.style.display = STATE.propertyType === "house" ? "" : "none";
}

function readSurvey() {
  STATE.area = +document.getElementById("bz-area").value || 0;
  STATE.rooms = +document.getElementById("bz-rooms").value || 0;
  STATE.techRooms = +document.getElementById("bz-techRooms").value || 0;
  STATE.people = +document.getElementById("bz-people").value || 0;
}

function validateSurvey() {
  readSurvey();
  const warnings = [];
  const errors = [];

  if (STATE.area < RULES.AREA_MIN) {
    errors.push(`К сожалению, мы не работаем с объектами менее ${RULES.AREA_MIN} м². Расчёт невозможен.`);
  } else if (STATE.area > RULES.AREA_MAX) {
    warnings.push(`Объекты более ${RULES.AREA_MAX} м² требуют индивидуального расчёта. Оставьте заявку — мы свяжемся.`);
  }
  if (STATE.rooms < RULES.ROOMS_MIN) {
    errors.push(`Минимум ${RULES.ROOMS_MIN} обслуживаемых помещения.`);
  } else if (STATE.rooms > RULES.ROOMS_MAX) {
    warnings.push(`При количестве помещений больше ${RULES.ROOMS_MAX} нужен индивидуальный расчёт.`);
  }
  if (STATE.techRooms > RULES.TECH_MAX) {
    errors.push(`Слишком много технических помещений (максимум ${RULES.TECH_MAX}).`);
  }
  if (STATE.people > RULES.PEOPLE_MAX) {
    errors.push(`Слишком много проживающих (максимум ${RULES.PEOPLE_MAX}).`);
  }
  if (STATE.pool === "yes") {
    warnings.push("Помещения с бассейном считаются отдельно. В смете ниже бассейн НЕ учтён.");
  }

  const box = document.getElementById("bz-survey-warning");
  box.innerHTML = "";
  for (const w of warnings) {
    const d = document.createElement("div");
    d.className = "bz-alert"; d.textContent = w;
    box.appendChild(d);
  }
  for (const e of errors) {
    const d = document.createElement("div");
    d.className = "bz-alert"; d.style.background = "#fee2e2"; d.style.color = "#b91c1c";
    d.textContent = e;
    box.appendChild(d);
  }

  document.getElementById("bz-calc-btn").disabled = errors.length > 0;
  return errors.length === 0;
}

function fmtRub(n) {
  return new Intl.NumberFormat("ru-RU").format(Math.round(n)) + " ₽";
}

function runCalc() {
  if (!validateSurvey()) return;

  // Расход
  const flow = Math.max(STATE.rooms * RULES.AIR_PER_ROOM, STATE.people * RULES.AIR_PER_PERSON);
  STATE.context = { requiredFlow: flow };

  STATE.packages = {
    basic:   calcPackage("basic"),
    comfort: calcPackage("comfort"),
    lux:     calcPackage("lux"),
  };

  renderResults();
  document.getElementById("bz-step-survey").style.display = "none";
  document.getElementById("bz-step-result").style.display = "";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderResults() {
  const grid = document.getElementById("bz-results-grid");
  grid.innerHTML = "";

  const meta = {
    basic:   { tag: "Базово",  desc: "Оптимальный набор для комфортного климата" },
    comfort: { tag: "Комфорт", desc: "Запас по производительности и улучшенный утеплитель" },
    lux:     { tag: "Люкс",    desc: "Премиум: фреоновое охлаждение, тихий вентилятор, фильтрация" },
  };

  for (const pkg of ["basic", "comfort", "lux"]) {
    const data = STATE.packages[pkg];
    const card = document.createElement("div");
    card.className = "bz-package" + (pkg === "comfort" ? " bz-recommended" : "");

    // Группируем по разделам
    const sections = {};
    for (const item of data.items) {
      if (!sections[item.section]) sections[item.section] = [];
      sections[item.section].push(item);
    }

    let itemsHtml = "";
    for (const [sec, list] of Object.entries(sections)) {
      itemsHtml += `<li class="bz-pkg-section">${sec}</li>`;
      for (const i of list) {
        itemsHtml += `<li><span>${i.name}${i.comment ? `<br><span style='color:var(--bz-fg-muted); font-size:11px'>${i.comment}</span>` : ""}</span><span class="bz-item-price">${fmtRub(i.price)}</span></li>`;
      }
    }

    card.innerHTML = `
      ${pkg === "comfort" ? '<div class="bz-pkg-tag">Рекомендуем</div>' : ""}
      <div class="bz-pkg-name">${meta[pkg].tag}</div>
      <div class="bz-pkg-desc">${meta[pkg].desc}</div>
      <div class="bz-pkg-total">${fmtRub(data.total)}</div>
      <ul class="bz-pkg-items">${itemsHtml}</ul>
      <button class="bz-btn bz-btn-primary bz-pkg-download" data-pkg="${pkg}">Скачать смету</button>
    `;
    grid.appendChild(card);
  }

  // Контекст-резюме
  const ctx = STATE.context;
  const summary = `${STATE.area} м², ${STATE.rooms} комнат, ${STATE.people} чел, ${STATE.propertyType === "house" ? "дом" : "квартира"}, ${STATE.location === "moscow" ? "Москва" : "МО"}. Требуемый расход приточки: ${ctx.requiredFlow} м³/ч.`;
  document.getElementById("bz-result-summary").textContent = summary;

  // Привязываем кнопки скачивания
  grid.querySelectorAll(".bz-pkg-download").forEach(btn => {
    btn.addEventListener("click", () => {
      openLeadModal(btn.dataset.pkg);
    });
  });
}

async function submitLead() {
  const name = document.getElementById("bz-lead-name").value.trim();
  const phone = document.getElementById("bz-lead-phone").value.trim();
  const errBox = document.getElementById("bz-lead-error");
  const submitBtn = document.getElementById("bz-lead-submit");
  errBox.textContent = "";

  if (!name) { errBox.textContent = "Укажите имя"; return; }
  if (!phone || phone.replace(/\D/g, "").length < 10) {
    errBox.textContent = "Укажите корректный телефон"; return;
  }

  const origText = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = "Готовим смету…";

  const pkgData = STATE.packages[pendingPackage];
  const pkgLabel = { basic: "Базово", comfort: "Комфорт", lux: "Люкс" }[pendingPackage];

  // Отправка в Tilda
  const lead = {
    Name: name,
    Phone: phone,
    Form: "Калькулятор сметы",
    Package: pkgLabel,
    Total: pkgData.total,
    Area: STATE.area,
    Rooms: STATE.rooms,
    Property: STATE.propertyType === "house" ? "Дом" : "Квартира",
    Location: STATE.location === "moscow" ? "Москва" : "МО",
  };

  try {
    if (TILDA_WEBHOOK_URL) {
      const fd = new FormData();
      for (const [k, v] of Object.entries(lead)) fd.append(k, v);
      await fetch(TILDA_WEBHOOK_URL, { method: "POST", body: fd, mode: "no-cors" });
    } else {
      console.warn("[BZ] TILDA_WEBHOOK_URL не настроен, лид только в console:", lead);
    }
  } catch (e) {
    console.error("[BZ] ошибка отправки лида:", e);
    // Не блокируем выдачу PDF — лучше отдать клиенту смету, чем потерять обоих.
  }

  document.getElementById("bz-lead-modal").classList.remove("show");

  // Генерируем PDF (асинхронно — подгружает шрифт)
  try {
    await generatePDF(pendingPackage, name);
  } catch (e) {
    console.error("[BZ] ошибка генерации PDF:", e);
    alert("Не удалось сформировать PDF. Попробуйте ещё раз или свяжитесь с нами — мы вышлем смету вручную.");
  }

  submitBtn.disabled = false;
  submitBtn.textContent = origText;
}

// ============================================================
//                    ГЕНЕРАЦИЯ PDF
// ============================================================

// URL шрифтов PT Sans (SIL OFL 1.1, поддержка кириллицы).
// Пробуем несколько CDN по очереди — на случай если один недоступен.
// Рекомендация: можно захостить эти TTF на своём GitHub Pages
// (рядом с catalog.json) и указать вместо CDN — будет надёжнее.
const FONT_URLS_REGULAR = [
  "https://cdn.jsdelivr.net/fontsource/fonts/pt-sans@latest/cyrillic-400-normal.ttf",
  "https://unpkg.com/@fontsource/pt-sans/files/pt-sans-cyrillic-400-normal.ttf",
];
const FONT_URLS_BOLD = [
  "https://cdn.jsdelivr.net/fontsource/fonts/pt-sans@latest/cyrillic-700-normal.ttf",
  "https://unpkg.com/@fontsource/pt-sans/files/pt-sans-cyrillic-700-normal.ttf",
];

let _fontCache = null;
let _fontLoadingPromise = null;

async function loadFontBase64(urls) {
  let lastError = null;
  for (const url of urls) {
    try {
      const r = await fetch(url);
      if (!r.ok) { lastError = new Error("HTTP " + r.status); continue; }
      const buf = await r.arrayBuffer();
      if (buf.byteLength < 1000) { lastError = new Error("файл слишком мал"); continue; }
      const bytes = new Uint8Array(buf);
      let bin = "";
      const chunk = 0x8000;
      for (let i = 0; i < bytes.length; i += chunk) {
        bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
      }
      return btoa(bin);
    } catch (e) {
      lastError = e;
    }
  }
  throw lastError || new Error("все источники шрифта недоступны");
}

async function ensureFontLoaded() {
  if (_fontCache) return _fontCache;
  if (_fontLoadingPromise) return _fontLoadingPromise;
  _fontLoadingPromise = (async () => {
    try {
      const [regB64, boldB64] = await Promise.all([
        loadFontBase64(FONT_URLS_REGULAR),
        loadFontBase64(FONT_URLS_BOLD),
      ]);
      _fontCache = { regular: regB64, bold: boldB64, ok: true };
    } catch (e) {
      console.warn("[BZ] не удалось загрузить кириллический шрифт, PDF будет на латинице:", e);
      _fontCache = { ok: false };
    }
    return _fontCache;
  })();
  return _fontLoadingPromise;
}

async function generatePDF(pkg, clientName) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "mm", format: "a4" });

  // Грузим шрифт (один раз за сессию)
  const font = await ensureFontLoaded();
  if (font.ok) {
    doc.addFileToVFS("PTSans-Regular.ttf", font.regular);
    doc.addFont("PTSans-Regular.ttf", "PTSans", "normal");
    doc.addFileToVFS("PTSans-Bold.ttf", font.bold);
    doc.addFont("PTSans-Bold.ttf", "PTSans", "bold");
    doc.setFont("PTSans", "normal");
  }
  const FONT = font.ok ? "PTSans" : "helvetica";

  const pkgLabel = { basic: "Базово", comfort: "Комфорт", lux: "Люкс" }[pkg];
  const data = STATE.packages[pkg];

  // ---- Шапка ----
  let y = 15;
  doc.setFont(FONT, "bold");
  doc.setFontSize(16);
  doc.text(`Коммерческое предложение — ${pkgLabel}`, 15, y);
  y += 8;
  doc.setFont(FONT, "normal");
  doc.setFontSize(10);
  doc.text(`${COMPANY.name}`, 15, y); y += 4;
  doc.text(`${COMPANY.phone}   ${COMPANY.email}   ${COMPANY.site}`, 15, y); y += 6;
  doc.text(`Клиент: ${clientName}    Дата: ${new Date().toLocaleDateString("ru-RU")}`, 15, y);
  y += 8;

  // ---- Параметры объекта ----
  doc.setFont(FONT, "bold");
  doc.setFontSize(11);
  doc.text("Параметры объекта", 15, y); y += 5;
  doc.setFont(FONT, "normal");
  doc.setFontSize(9);
  const params = [
    `Площадь: ${STATE.area} м²    Помещений: ${STATE.rooms}    Тех. помещений: ${STATE.techRooms}    Проживающих: ${STATE.people}`,
    `Тип: ${STATE.propertyType === "house" ? "Дом" : "Квартира"}    Локация: ${STATE.location === "moscow" ? "Москва" : "МО"}    Отопление: ${STATE.propertyType === "house" ? (STATE.heating === "gas" ? "газ" : "электричество") : "—"}`,
    `Бассейн: ${STATE.pool === "yes" ? "есть (считается отдельно)" : "нет"}    Животные: ${STATE.pets === "yes" ? "есть" : "нет"}    Аллергии: ${STATE.allergy === "yes" ? "есть" : "нет"}`,
    `Расход приточки: ${STATE.context.requiredFlow} м³/ч`,
  ];
  for (const p of params) { doc.text(p, 15, y); y += 4.5; }
  y += 4;

  // ---- Таблица сметы ----
  const rows = [];
  let lastSection = "";
  for (const item of data.items) {
    if (item.section !== lastSection) {
      rows.push([{
        content: item.section,
        colSpan: 2,
        styles: { fontStyle: "bold", fillColor: [240, 240, 245], textColor: [60, 60, 70] },
      }]);
      lastSection = item.section;
    }
    rows.push([
      item.name + (item.comment ? `\n${item.comment}` : ""),
      fmtRub(item.price),
    ]);
  }
  rows.push([
    { content: "ИТОГО", styles: { fontStyle: "bold", fillColor: [37, 99, 235], textColor: [255, 255, 255] } },
    { content: fmtRub(data.total), styles: { fontStyle: "bold", fillColor: [37, 99, 235], textColor: [255, 255, 255], halign: "right" } },
  ]);

  doc.autoTable({
    startY: y,
    head: [[
      { content: "Наименование работ и оборудования", styles: { halign: "left" } },
      { content: "Стоимость", styles: { halign: "right" } },
    ]],
    body: rows,
    styles: { font: FONT, fontSize: 9, cellPadding: 2.5, lineColor: [220, 220, 230], lineWidth: 0.1 },
    headStyles: { fillColor: [37, 99, 235], textColor: [255, 255, 255], fontStyle: "bold" },
    columnStyles: { 0: { cellWidth: 140 }, 1: { halign: "right", cellWidth: 40 } },
    didParseCell: function(data) {
      // Уменьшаем шрифт для пояснений (строки с переносом)
      if (data.cell.text && data.cell.text.length === 2) {
        // первая строка — название, вторая — пояснение
      }
    },
  });

  let finalY = doc.lastAutoTable.finalY + 8;

  // ---- Подпись внизу ----
  doc.setFontSize(8);
  doc.setTextColor(110, 110, 110);
  doc.text("Цены приточных установок Breezart актуальны на дату формирования предложения.", 15, finalY);
  doc.text("КП носит ориентировочный характер. Точная стоимость определяется после выезда на объект.", 15, finalY + 4);

  doc.save(`КП_${pkgLabel}_${new Date().toISOString().slice(0, 10)}.pdf`);
}
